# Screenager configuration.
# Place this file next to screenager.exe. Lines starting with ; or # are comments.

[limits]
daily_minutes = 120          ; active minutes allowed per day
reset_hour = 4               ; local hour the daily counter resets (4 = 4am)
idle_threshold_seconds = 60  ; no input for this long => countdown pauses
audio_counts_as_activity = true ; a playing video/audio counts as active even without input
warn_seconds = 30            ; show the big warning when this many seconds remain
bedtime_start = 21:00        ; lock after this local time regardless of budget (blank = off)
bedtime_end   = 06:00        ; bedtime window ends here (unlocking before then re-locks)

[override]
pin = 1234                   ; parent PIN for the bonus/override hotkey
hotkey = Ctrl+Alt+Shift+S    ; press to open the "add minutes" dialog
grace_seconds = 30           ; while the override dialog is open, suspend locking this long

[display]
count_up = false             ; false = count down (time left); true = count up (time used)

[startup]
hidden = true                ; install with:  screenager.exe --install

[report]
enabled = true
send_hour = 20               ; local hour to email the daily report
collect_browser_history = true

[mailgun]
api_base = https://api.mailgun.net      ; use https://api.eu.mailgun.net for EU-region domains
domain   = mg.example.com               ; your Mailgun sending domain
api_key  = key-xxxxxxxxxxxxxxxxxxxxxxx  ; Mailgun private API key (used as Basic-auth password)
from     = Screenager <screenager@mg.example.com>
to       = parent@example.com
